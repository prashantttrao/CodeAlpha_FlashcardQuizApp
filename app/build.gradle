apply plugin: "com.android.application"

android {
    namespace "com.codealpha.flashcardquiz"
    compileSdk 35

    defaultConfig {
        applicationId "com.codealpha.flashcardquiz"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
